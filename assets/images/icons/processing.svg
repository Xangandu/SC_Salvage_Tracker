<svg xmlns="http://www.w3.org/2000/svg"
     viewBox="0 0 64 64">

    <!-- Hexagon -->

    <g fill="none"
       stroke="#00D9FF"
       stroke-width="2">

        <polygon
            points="16,8 48,8 60,32 48,56 16,56 4,32"/>

        <polygon
            points="20,14 44,14 54,32 44,50 20,50 10,32"
            opacity="0.45"/>

    </g>

    <!-- Mittelpunkt -->

    <circle
        cx="32"
        cy="32"
        r="5"
        fill="#05090D"
        stroke="#00D9FF"
        stroke-width="2"/>

    <!-- Linkes Kreissegment -->

    <path
        d="M22 36
           A10 10 0 0 1 22 28"
        fill="none"
        stroke="#00D9FF"
        stroke-width="3"
        stroke-linecap="round"/>

    <polygon
        points="20,25 24,28 19,30"
        fill="#00D9FF"/>

    <!-- Rechtes Kreissegment -->

    <path
        d="M42 28
           A10 10 0 0 1 42 36"
        fill="none"
        stroke="#00D9FF"
        stroke-width="3"
        stroke-linecap="round"/>

    <polygon
        points="45,39 40,36 45,34"
        fill="#00D9FF"/>

</svg>