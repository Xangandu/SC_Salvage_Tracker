<svg width="280" height="40" viewBox="0 0 280 40"
     xmlns="http://www.w3.org/2000/svg">

    <defs>
        <linearGradient id="lineGrad"
                        x1="0%" y1="0%"
                        x2="100%" y2="0%">
            <stop offset="0%" stop-color="#00D9FF" stop-opacity="0"/>
            <stop offset="50%" stop-color="#00D9FF"/>
            <stop offset="100%" stop-color="#00D9FF" stop-opacity="0"/>
        </linearGradient>
    </defs>

    <!-- Linkes Segment -->

    <path d="
        M20 20
        L35 14
        L90 14
        L100 20
        L90 26
        L35 26
        Z"
        fill="#08131C"
        stroke="#00D9FF"
        stroke-width="1"/>

    <!-- Rechtes Segment -->

    <path d="
        M260 20
        L245 14
        L190 14
        L180 20
        L190 26
        L245 26
        Z"
        fill="#08131C"
        stroke="#00D9FF"
        stroke-width="1"/>

    <!-- Verbindung -->

    <line x1="100"
          y1="20"
          x2="180"
          y2="20"
          stroke="url(#lineGrad)"
          stroke-width="1"/>

    <!-- Zentraler Node -->

    <rect x="133"
          y="13"
          width="14"
          height="14"
          fill="#08131C"
          stroke="#55E8FF"
          stroke-width="1"/>

    <!-- Datenpunkte -->

    <circle cx="55"
            cy="20"
            r="1.5"
            fill="#55E8FF"/>

    <circle cx="225"
            cy="20"
            r="1.5"
            fill="#55E8FF"/>

    <!-- Mikro-Markierungen -->

    <line x1="110" y1="16"
          x2="110" y2="24"
          stroke="#00D9FF"
          stroke-width="1"/>

    <line x1="170" y1="16"
          x2="170" y2="24"
          stroke="#00D9FF"
          stroke-width="1"/>

</svg>